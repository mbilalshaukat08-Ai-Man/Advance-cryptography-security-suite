<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Cryptography & Security Suite</title>
    <style>
:root {
            --bg-primary: #121214;
            --bg-secondary: #1a1a1e;
            --bg-tertiary: #26262b;
            --text-main: #e1e1e6;
            --text-muted: #a8a8b3;
            --accent: #4ea8de;
            --accent-hover: #64dfdf;
            --border: #323238;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: var(--bg-tertiary);
            padding: 20px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            color: var(--accent);
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .tabs {
            display: flex;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.02);
            color: var(--text-main);
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom: 3px solid var(--accent);
            background: var(--bg-secondary);
        }

        .tab-content {
            padding: 25px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: rgba(255,255,255,0.01);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .toggle-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            min-width: 140px;
            transition: all 0.2s;
        }

        .toggle-btn.decrypt-mode {
            border-color: #ff5555;
            color: #ff5555;
        }

        select {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-weight: 600;
        }

        label {
            font-weight: 600;
            color: var(--text-muted);
        }

        .range-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            accent-color: var(--accent);
            cursor: pointer;
            width: 150px;
        }

        .key-badge {
            background: var(--accent);
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        .text-input-field {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            font-family: monospace;
        }

        .text-areas-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media(min-width: 768px) {
            .text-areas-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .area-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            padding: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        textarea[readonly] {
            background: #1e1e24;
            color: #a5d6a7;
        }

        .file-drop-zone {
            border: 2px dashed var(--border);
            padding: 40px;
            text-align: center;
            border-radius: 8px;
            background: var(--bg-tertiary);
            cursor: pointer;
            margin-bottom: 20px;
            transition: border 0.2s;
        }

        .file-drop-zone:hover {
            border-color: var(--accent);
        }

        .file-info {
            margin-top: 10px;
            font-size: 14px;
            color: var(--accent);
            font-weight: bold;
        }

        .action-btn {
            background: var(--accent);
            color: #121214;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: var(--accent-hover);
        }

        .brute-output {
            height: 350px !important;
            white-space: pre;
            overflow-y: scroll;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Advanced Cryptography & Security Suite</h1>
        <p>Encrypt, decrypt, and crack classic ciphers right in your browser</p>
    </div>

    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab(event, 'interactive')">Cipher</div>
        <div class="tab-btn" onclick="switchTab(event, 'file')">File Encryption</div>
        <div class="tab-btn" onclick="switchTab(event, 'brute')">Crack a Cipher</div>
    </div>

    <div id="interactive" class="tab-content active">
        <div class="control-row">
            <button id="modeToggle" class="toggle-btn" onclick="toggleMode()">Encrypt Mode</button>
            
            <label for="algorithmSelect">Cipher Type:</label>
            <select id="algorithmSelect" onchange="handleEngineChange()">
                <option value="caesar">Caesar</option>
                <option value="vigenere">Vigenère</option>
            </select>

            <div id="caesarControls" class="range-container">
                <label for="interactiveKey">Shift:</label>
                <input type="range" id="interactiveKey" min="1" max="25" value="3" oninput="syncKey(this.value)">
                <span id="keyValueDisplay" class="key-badge">3</span>
            </div>

            <div id="vigenereControls" class="range-container" style="display: none;">
                <label for="vigenereKey">Keyword:</label>
                <input type="text" id="vigenereKey" class="text-input-field" value="CYBER" placeholder="e.g. CYBER" oninput="runLiveCipher()">
            </div>
        </div>

        <div class="text-areas-grid">
            <div class="area-box">
                <label>Input Text:</label>
                <textarea id="interactiveInput" placeholder="Type or paste your text here..." oninput="runLiveCipher()"></textarea>
            </div>
            <div class="area-box">
                <label>Output:</label>
                <textarea id="interactiveOutput" readonly placeholder="Result will show up here..."></textarea>
            </div>
        </div>
    </div>

    <div id="file" class="tab-content">
        <div class="control-row">
            <label>Mode:</label>
            <input type="radio" id="fileEnc" name="fileMode" value="encrypt" checked onchange="processFileData()"> 
            <label for="fileEnc" style="font-weight: normal; margin-right: 15px;">Encrypt</label>
            <input type="radio" id="fileDec" name="fileMode" value="decrypt" onchange="processFileData()"> 
            <label for="fileDec" style="font-weight: normal; margin-right: 20px;">Decrypt</label>
            
            <label for="fileAlgorithmSelect">Cipher:</label>
            <select id="fileAlgorithmSelect" onchange="handleFileEngineChange()">
                <option value="caesar">Caesar</option>
                <option value="vigenere">Vigenère</option>
            </select>

            <div id="fileCaesarConfig" style="display: inline-block;">
                <label style="margin-left: 20px;">Key Shift:</label>
                <input type="number" id="fileKey" min="1" max="25" value="3" oninput="processFileData()" style="width: 60px; background: var(--bg-tertiary); border: 1px solid var(--border); color:#fff; padding:4px; border-radius:4px; text-align: center;">
            </div>

            <div id="fileVigenereConfig" style="display: none;">
                <label style="margin-left: 20px;">Keyword:</label>
                <input type="text" id="fileVigenereKey" class="text-input-field" value="CYBER" oninput="processFileData()" style="width: 120px;">
            </div>
        </div>

        <div class="file-drop-zone" onclick="document.getElementById('fileInputElement').click()">
            <p>Click to upload a .txt file</p>
            <input type="file" id="fileInputElement" accept=".txt" style="display: none;" onchange="handleFileLoad(event)">
            <div id="fileNameDisplay" class="file-info"></div>
        </div>

        <div class="text-areas-grid" style="margin-bottom: 20px;">
            <div class="area-box">
                <label>Original File Contents:</label>
                <textarea id="fileInputText" readonly placeholder="No file loaded yet..."></textarea>
            </div>
            <div class="area-box">
                <label>Result:</label>
                <textarea id="fileOutputText" readonly placeholder="Processed text will show up here..."></textarea>
            </div>
        </div>

        <button class="action-btn" onclick="executeFileDownload()">Download Result</button>
    </div>

    <div id="brute" class="tab-content">
        <div class="control-row" style="margin-bottom: 10px;">
            <label>Paste Caesar-encrypted text below. This tries every possible shift and guesses which one is correct:</label>
        </div>
        <textarea id="bruteInput" style="height: 100px; margin-bottom: 20px;" placeholder="Paste encrypted text here..." oninput="runBruteForceCrack()"></textarea>
        
        <label>Results:</label>
        <textarea id="bruteOutput" class="brute-output" readonly placeholder="All 25 possible shifts will show up here, ranked by likelihood..."></textarea>
    </div>
</div>

<script>
let isDecryptMode = false;

// Common English words, used to check if decrypted text makes sense
const COMMON_WORDS = new Set([
    "the", "be", "to", "of", "and", "a", "in", "that", "have", "i", "it", "for", "not", "on", "with", "he",
    "as", "you", "do", "at", "this", "but", "his", "by", "from", "they", "we", "say", "her", "she", "or",
    "an", "will", "my", "one", "all", "would", "there", "their", "what", "so", "up", "out", "if", "about",
    "who", "get", "which", "go", "me", "when", "make", "can", "like", "time", "no", "just", "him", "know",
    "take", "people", "into", "year", "your", "good", "some", "could", "them", "see", "other", "than", "then",
    "now", "look", "only", "come", "its", "over", "think", "also", "back", "after", "use", "two", "how",
    "our", "work", "first", "well", "way", "even", "new", "want", "because", "any", "these", "give", "day",
    "most", "us", "attack", "project", "security", "framework", "system", "cyber", "advanced", "score", "data",
    "redhat", "linux", "admin", "server", "cloud", "network", "host", "node", "root", "user", "pass", "code", "insight"
]);

function switchTab(evt, tabId) {
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    evt.currentTarget.classList.add('active');
}

function toggleMode() {
    const btn = document.getElementById('modeToggle');
    isDecryptMode = !isDecryptMode;
    btn.innerText = isDecryptMode ? "Decrypt Mode" : "Encrypt Mode";
    btn.className = isDecryptMode ? "toggle-btn decrypt-mode" : "toggle-btn";
    runLiveCipher();
}

function syncKey(val) {
    document.getElementById('keyValueDisplay').innerText = val;
    runLiveCipher();
}

function handleEngineChange() {
    const selected = document.getElementById('algorithmSelect').value;
    document.getElementById('caesarControls').style.display = selected === 'caesar' ? 'flex' : 'none';
    document.getElementById('vigenereControls').style.display = selected === 'vigenere' ? 'flex' : 'none';
    runLiveCipher();
}

function handleFileEngineChange() {
    const selected = document.getElementById('fileAlgorithmSelect').value;
    document.getElementById('fileCaesarConfig').style.display = selected === 'caesar' ? 'inline-block' : 'none';
    document.getElementById('fileVigenereConfig').style.display = selected === 'vigenere' ? 'inline-block' : 'none';
    processFileData();
}

// Shifts every letter by a fixed number of places in the alphabet
function runCaesar(message, shift) {
    if (!message) return "";
    let result = "";
    shift = (shift % 26 + 26) % 26;

    for (let i = 0; i < message.length; i++) {
        let charCode = message.charCodeAt(i);
        if (charCode >= 97 && charCode <= 122) {
            result += String.fromCharCode(((charCode - 97 + shift) % 26) + 97);
        } else if (charCode >= 65 && charCode <= 90) {
            result += String.fromCharCode(((charCode - 65 + shift) % 26) + 65);
        } else {
            result += message.charAt(i);
        }
    }
    return result;
}

// Shifts each letter using a repeating keyword instead of one fixed shift
function runVigenere(message, key, decrypt = false) {
    if (!message) return "";
    if (!key) return message;

    let result = "";
    let keyIndex = 0;

    key = key.toLowerCase().replace(/[^a-z]/g, '');
    if (key.length === 0) return message;

    for (let i = 0; i < message.length; i++) {
        let charCode = message.charCodeAt(i);
        let isLower = (charCode >= 97 && charCode <= 122);
        let isUpper = (charCode >= 65 && charCode <= 90);

        if (isLower || isUpper) {
            let shift = key.charCodeAt(keyIndex % key.length) - 97;
            if (decrypt) {
                shift = 26 - shift;
            }
            shift = (shift % 26 + 26) % 26;

            let base = isLower ? 97 : 65;
            result += String.fromCharCode(((charCode - base + shift) % 26) + base);
            keyIndex++;
        } else {
            result += message.charAt(i);
        }
    }
    return result;
}

function runLiveCipher() {
    const msg = document.getElementById('interactiveInput').value;
    const algo = document.getElementById('algorithmSelect').value;
    const outputField = document.getElementById('interactiveOutput');

    if (algo === 'caesar') {
        const key = parseInt(document.getElementById('interactiveKey').value);
        outputField.value = isDecryptMode ? runCaesar(msg, 26 - key) : runCaesar(msg, key);
    } else {
        const keyWord = document.getElementById('vigenereKey').value.trim();
        outputField.value = runVigenere(msg, keyWord, isDecryptMode);
    }
}

function handleFileLoad(event) {
    const file = event.target.files[0];
    if (!file) return;
    document.getElementById('fileNameDisplay').innerText = `Selected File: ${file.name}`;

    const reader = new FileReader();
    reader.onload = function (e) {
        document.getElementById('fileInputText').value = e.target.result;
        processFileData();
    };
    reader.readAsText(file);
}

function processFileData() {
    const srcText = document.getElementById('fileInputText').value;
    if (!srcText) return;

    const isFileEncrypt = document.getElementById('fileEnc').checked;
    const algo = document.getElementById('fileAlgorithmSelect').value;
    const outputField = document.getElementById('fileOutputText');

    if (algo === 'caesar') {
        let key = parseInt(document.getElementById('fileKey').value);
        if (isNaN(key)) key = 3;
        const activeShift = isFileEncrypt ? key : (26 - key);
        outputField.value = runCaesar(srcText, activeShift);
    } else {
        const keyWord = document.getElementById('fileVigenereKey').value.trim();
        outputField.value = runVigenere(srcText, keyWord, !isFileEncrypt);
    }
}

function executeFileDownload() {
    const outData = document.getElementById('fileOutputText').value;
    if (!outData) {
        alert("There is no processed output text to download yet!");
        return;
    }
    const blob = new Blob([outData], { type: "text/plain;charset=utf-8" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "processed_output.txt";
    link.click();
}

// Checks how many words in a piece of text are real English words.
// Used to guess which decryption attempt is most likely correct.
function scoreText(text) {
    let words = text.toLowerCase().split(/[^a-z]+/);
    let realWordCount = 0;
    let checkedWords = 0;

    words.forEach(w => {
        if (w.length > 0) {
            checkedWords++;
            if (COMMON_WORDS.has(w)) {
                realWordCount++;
            }
        }
    });
    return checkedWords > 0 ? (realWordCount / checkedWords) : 0;
}

// Tries all 25 possible Caesar shifts and ranks them by how "real" the result looks
function runBruteForceCrack() {
    const input = document.getElementById('bruteInput').value;
    const outputArea = document.getElementById('bruteOutput');

    if (!input.trim()) {
        outputArea.value = "";
        return;
    }

    let candidates = [];
    for (let possibleKey = 1; possibleKey <= 25; possibleKey++) {
        let attempt = runCaesar(input, 26 - possibleKey);
        let score = scoreText(attempt);
        candidates.push({ key: possibleKey, text: attempt, score: score });
    }

    candidates.sort((a, b) => b.score - a.score);

    let log = `RANK | SHIFT | MATCH % | DECRYPTED TEXT\n`;
    log += `--------------------------------------------------------------\n`;

    candidates.forEach((cand, index) => {
        let rank = (index + 1).toString().padStart(2, '0');
        let paddedKey = cand.key.toString().padStart(2, '0');
        let confidence = Math.round(cand.score * 100);
        let badge = (index === 0 && confidence > 0) ? " <- most likely" : "";

        log += `#${rank}  | ${paddedKey}    | ${confidence}%${badge.padEnd(16)} | ${cand.text}\n`;
    });

    outputArea.value = log;
    outputArea.scrollTop = 0;
}
</script>
</body>
</html>
